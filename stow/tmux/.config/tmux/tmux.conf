#### Tmux Base config

# Prefix: Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# UX
set -sg escape-time 0
set -g history-limit 200000
setw -g mode-keys vi
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -g mouse on
set -g focus-events on
set -g set-clipboard external
set -g extended-keys on
set -g extended-keys-format xterm

# Terminal capabilities
set -as terminal-features ",xterm-ghostty:RGB:clipboard:focus:title"
set -as terminal-features ",xterm-256color:RGB:clipboard:focus:title"

# Terminal/window title (remote-friendly context)
set -g set-titles on
set -g set-titles-string '#{host_short} • #S:#I:#W • #{pane_current_command} @ #{b:pane_current_path}'

# Copy mode (vi style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Reload
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'TechnicalDC/tmux-ayu-theme'

# Ayu theme options
set -g @ayu_date_format "%Y-%m-%d"
set -g @ayu_time_format "%H:%M"

# TPM (keep last)
run '~/.config/tmux/plugins/tpm/tpm'
