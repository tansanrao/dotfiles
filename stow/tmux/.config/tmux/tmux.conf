#### Tmux Base config

# Prefix: Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# UX
set -sg escape-time 0
set -g history-limit 200000
setw -g mode-keys vi
if-shell '[ -n "$SHELL" ]' 'set -g default-shell "$SHELL"' 'set -g default-shell /bin/sh'
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' 'set -g default-terminal "tmux-256color"' 'set -g default-terminal "screen-256color"'
set -g mouse on
set -gq focus-events on
set -gq set-clipboard external
set -gq extended-keys on
set -gq extended-keys-format xterm

# Terminal capabilities
set -asq terminal-features ",xterm-ghostty:RGB:clipboard:focus:title"
set -asq terminal-features ",xterm-256color:RGB:clipboard:focus:title"
set -asq terminal-overrides ",xterm-ghostty:Tc"
set -asq terminal-overrides ",xterm-256color:Tc"

# Terminal/window title (remote-friendly context)
set -g set-titles on
set -g set-titles-string '#{host_short} • #S:#I:#W • #{pane_current_command} @ #{b:pane_current_path}'

# Copy mode (vi style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Reload
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'TechnicalDC/tmux-ayu-theme'

# Ayu theme options
set -g @ayu_date_format "%Y-%m-%d"
set -g @ayu_time_format "%H:%M"

# TPM (keep last)
if-shell '[ -n "$XDG_DATA_HOME" ] && [ -x "$XDG_DATA_HOME/tmux/plugins/tpm/tpm" ]' \
  'run-shell "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"' \
  'if-shell "[ -x \"$HOME/.local/share/tmux/plugins/tpm/tpm\" ]" "run-shell \"$HOME/.local/share/tmux/plugins/tpm/tpm\"" "display-message \"TPM missing: run install.sh to install plugins.\""' 
