# ~/.config/tmux/tmux.conf

# Set prefix to Space
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Set base index for windows and panes to 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set escape time
set -s escape-time 0

# Set history limit
set -g history-limit 10000

# Set vi mode for copy mode
setw -g mode-keys vi

# Set terminal
set -g default-terminal "screen-256color"

# Set default shell to zsh
set -g default-shell /bin/zsh

# Enable mouse mode
set -g mouse on

# Focus events enabled for terminals that support them
set -g focus-events on

# True color settings
set -ag terminal-overrides ",$TERM:Tc"

# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Catppuccin theme (will be loaded if plugin is installed)
# These settings will be applied if the catppuccin plugin is available
set -g @catppuccin_flavour 'mocha'

# Plugin settings (for when TPM is installed)
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm' 