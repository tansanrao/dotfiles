# ~/.config/mise/config.toml
# Mise configuration for development tools

[tools]
# Core development languages
node = "lts"
python = "3.12"

# Development tools that were previously managed by Nix
# These will be installed via mise when available
# or fallback to system package managers
"clang-tools" = "latest"  # clangd for C/C++ LSP
"texlab" = "latest"       # LaTeX LSP

[settings]
# Enable legacy version files (.nvmrc, .python-version, etc)
legacy_version_file = true

# Automatically install missing tools
auto_install = true

# Enable shell completions
activate_aggressive = true

[alias]
# Node.js aliases
nodejs = "node"
npm = "node"

# Python aliases  
py = "python"
pip = "python" 
